<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button List Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            background: #007bff;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 200px;
            text-align: center;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="button-container">
        <button class="btn" onclick="openTab('BDMaintenance.html')">BD Maintenance</button>
        <button class="btn" onclick="openTab('NewNetwork.html')">New Network</button>
        <button class="btn" onclick="openTab('Shifting.html')">Shifting</button>
    </div>
    
    <script>
        function openTab(url) {
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
